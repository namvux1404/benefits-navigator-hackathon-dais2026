<svg viewBox="0 0 200 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="TrustRoute route icon">
  <!-- Route base line (dashed) -->
  <line x1="22" y1="32" x2="162" y2="32" stroke="#5ab4cf" stroke-width="2.5" stroke-dasharray="5,4" opacity="0.65"/>
  <!-- Node 1: intake / family -->
  <circle cx="22" cy="32" r="9" fill="#1a3a4f" stroke="#7ec8e3" stroke-width="2.5"/>
  <circle cx="22" cy="32" r="4" fill="#a9d8ed"/>
  <!-- Node 2: pathway matching -->
  <circle cx="82" cy="32" r="8" fill="#1d5a7a" stroke="#7ec8e3" stroke-width="2"/>
  <circle cx="82" cy="32" r="3.5" fill="#7ec8e3"/>
  <!-- Node 3: facility trust -->
  <circle cx="142" cy="32" r="8" fill="#1d5a7a" stroke="#7ec8e3" stroke-width="2"/>
  <circle cx="142" cy="32" r="3.5" fill="#7ec8e3"/>
  <!-- Arrow pointing to destination -->
  <polygon points="168,32 157,26 157,38" fill="#7ec8e3" opacity="0.85"/>
  <!-- Destination: shield shape -->
  <path d="M 183 14 L 198 20 L 198 36 Q 190 46 183 50 Q 176 46 168 36 L 168 20 Z" fill="#0d4f6b" stroke="#7ee3c8" stroke-width="1.5"/>
  <!-- Checkmark inside shield -->
  <polyline points="175,32 181,39 192,22" stroke="#a9d8ed" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
